name: Validate Community Profiles

on:
  pull_request:
    paths:
      - 'community-profiles/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate profile JSON files
        run: |
          SCHEMA="community-profiles/profile-schema.json"
          ERRORS=0

          # Install jsonschema validator
          pip install jsonschema --quiet

          # Check each JSON file (excluding index and schema)
          for f in community-profiles/*.json; do
            base=$(basename "$f")
            if [[ "$base" == "profiles-index.json" || "$base" == "profile-schema.json" ]]; then
              continue
            fi

            echo "Validating: $f"

            # Check valid JSON
            if ! python -m json.tool "$f" > /dev/null 2>&1; then
              echo "  ❌ Invalid JSON"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Validate against schema
            if ! python -c "
          import json, jsonschema, sys
          with open('$SCHEMA') as s: schema = json.load(s)
          with open('$f') as p: profile = json.load(p)
          try:
              jsonschema.validate(profile, schema)
              print('  ✅ Valid')
          except jsonschema.ValidationError as e:
              print(f'  ❌ Schema error: {e.message}')
              sys.exit(1)
          "; then
              ERRORS=$((ERRORS + 1))
            fi

            # Check file size (max 50KB)
            SIZE=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null)
            if [ "$SIZE" -gt 51200 ]; then
              echo "  ❌ File too large (${SIZE} bytes, max 50KB)"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS validation error(s) found"
            exit 1
          fi

          echo ""
          echo "✅ All profiles valid"
